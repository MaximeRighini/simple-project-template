# =============================================================================
# GENERAL CONFIGURATION
# =============================================================================
# This file contains global application settings and default values applicable
# across all execution environments (e.g., log levels, timeouts).
# This represents the lowest priority layer in the configuration hierarchy.
# =============================================================================

pipeline:
  log_level: "INFO"
  timeout: 60

# =============================================================================
# DATA PATHS
# =============================================================================
# Centralizes all data input/output file paths.
# Keys defined under the 'data' block are intercepted by the Pipeline engine
# to trigger automated loading (auto-load) and saving (auto-dump) for Polars DataFrames.
# Use dynamic placeholders like {market} or {env} for dynamic path formatting.
# =============================================================================

data:
  # ---------------------------------------------------------------------------
  # @TODO: Remove 'dummy_table' when implementing actual pipeline data contracts.
  # This key is a template placeholder demonstrating automated disk storage mapping.
  # ---------------------------------------------------------------------------
  dummy_table: "data/{market}/{env}/dummy_placeholder.parquet"
